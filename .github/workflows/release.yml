name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute the next version without publishing)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # semantic-release needs the full history and tags to determine the next version
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npx semantic-release ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
